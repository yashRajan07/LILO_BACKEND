<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LILO Web Client</title>
    <style>
        body { 
            font-family: sans-serif; 
            max-width: 600px; 
            margin: 40px auto; 
            padding: 20px; 
            text-align: center; 
        }
        button { 
            padding: 15px 30px; 
            font-size: 18px; 
            margin: 10px; 
            cursor: pointer; 
            border-radius: 8px; 
            border: none; 
            transition: background-color 0.3s;
        }
        #startBtn { background-color: #4CAF50; color: white; }
        #startBtn:hover { background-color: #45a049; }
        #stopBtn { background-color: #f44336; color: white; }
        #stopBtn:hover { background-color: #da190b; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        
        #statusLog {
            color: #2196F3;
            height: 24px;
            margin: 10px 0;
            font-weight: bold;
        }
        
        #log { 
            text-align: left; 
            background: #f4f4f4; 
            padding: 15px; 
            height: 300px; 
            overflow-y: auto; 
            border-radius: 8px; 
            margin-top: 20px; 
            font-family: monospace; 
            font-size: 14px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

    <h1>🎙️ LILO Voice Assistant</h1>
    <p>Connect your browser directly to the FastAPI Backend.</p>

    <button id="startBtn">Connect & Speak</button>
    <button id="stopBtn" disabled>Disconnect</button>

    <div id="statusLog"></div>
    <div id="log"></div>

    <script src="app.js"></script>
</body>
</html>
